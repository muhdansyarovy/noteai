/* ─── AI CALL ─── */
function aiCall(prompt,sysPrompt){
return new Promise(function(res){
var settings=ST.gs();var key=settings.apiKey;
if(!key){res("[Atur API Key di tab Pengaturan]");return;}
var provider=settings.apiProvider||"groq";var url,model,headers,body;
if(provider==="groq"){
url="https://api.groq.com/openai/v1/chat/completions";model="llama-3.3-70b-versatile";
headers={"Content-Type":"application/json","Authorization":"Bearer "+key};
body=JSON.stringify({model:model,messages:[{role:"system",content:sysPrompt||"Anda asisten notulen rapat. Bahasa Indonesia. Ringkas, padat. JANGAN markdown."},{role:"user",content:prompt}],temperature:0.3,max_tokens:800});
}else{
url="https://api.anthropic.com/v1/messages";model="claude-sonnet-4-20250514";
headers={"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
body=JSON.stringify({model:model,system:sysPrompt||"Anda asisten notulen rapat. Bahasa Indonesia. Ringkas, padat. JANGAN markdown.",messages:[{role:"user",content:prompt}],max_tokens:800});
}
fetch(url,{method:"POST",headers:headers,body:body}).then(function(r){return r.json();}).then(function(d){
if(provider==="groq"){if(d.error)throw new Error(d.error.message);res(d.choices[0].message.content);}
else{if(d.error)throw new Error(d.error.message);res(d.content[0].text);}
}).catch(function(e){res("Error: "+e.message);});
});
}

/* ─── AMPLITUDE BARS ─── */
function AmpBars(p){
var cvs=ur(null),raf=ur(null);
ue(function(){
if(!p.active||!p.analyser||!cvs.current)return;
var c=cvs.current,x=c.getContext("2d");
var fData=new Uint8Array(p.analyser.frequencyBinCount);
function draw(){raf.current=requestAnimationFrame(draw);
p.analyser.getByteFrequencyData(fData);
var dp=devicePixelRatio||1,rc=c.getBoundingClientRect();
c.width=rc.width*dp;c.height=rc.height*dp;x.scale(dp,dp);
var W=rc.width,H=rc.height,bars=40,gap=2,bw=(W-(bars-1)*gap)/bars;
x.clearRect(0,0,W,H);
for(var i=0;i<bars;i++){var idx=Math.floor(i*(fData.length/bars));var val=fData[idx]/255;
var bh=Math.max(2,val*H*0.9);var xx=i*(bw+gap);
x.fillStyle="rgba(88,"+(86+Math.round(val*60))+",214,"+(0.3+val*0.7)+")";
x.beginPath();x.roundRect(xx,H-bh,bw,bh,bw/2);x.fill();}
}draw();
return function(){cancelAnimationFrame(raf.current);};
},[p.active,p.analyser]);
return h`<canvas ref=${cvs} style=${{width:"100%",height:p.h||50,borderRadius:12,background:"rgba(255,255,255,0.4)",display:"block"}}/>`;
}

/* ─── HELPERS ─── */
function fmt(s){return String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");}
function fmtTs(ts){return new Date(ts).toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit",second:"2-digit"});}

/* ════════════════════════════════════════════
   MAIN APP — all recording state lives here
   so switching tabs won't destroy it
   ════════════════════════════════════════════ */
function App(){
var _tab=us("rec"),tab=_tab[0],sTab=_tab[1];

/* ─── RECORDING STATE (lifted to App) ─── */
var _ph=us("idle"),ph=_ph[0],sPh=_ph[1];
var _el=us(0),el=_el[0],sEl=_el[1];
var _trans=us([]),trans=_trans[0],sTrans=_trans[1];
var _interim=us(""),interim=_interim[0],sInterim=_interim[1];
var _sums=us([]),sums=_sums[0],sSums=_sums[1];
var _sumLd=us(false),sumLd=_sumLd[0],sSumLd=_sumLd[1];
var _title=us(""),title=_title[0],sTitle=_title[1];
var _analyser=us(null),analyser=_analyser[0],sAnalyser=_analyser[1];
var _paused=us(false),paused=_paused[0],sPaused=_paused[1];

// Refs for stable access in callbacks
var recogRef=ur(null);
var timerRef=ur(null);
var sumTimerRef=ur(null);
var acRef=ur(null);
var msRef=ur(null);
var transRef=ur([]);
var lastSumIdxRef=ur(0);
var phRef=ur("idle");
var pausedRef=ur(false);
var scrollRef=ur(null);
var restartingRef=ur(false);

// Keep refs in sync
ue(function(){transRef.current=trans;},[trans]);
ue(function(){phRef.current=ph;},[ph]);
ue(function(){pausedRef.current=paused;},[paused]);

// Cleanup on unmount
ue(function(){return function(){
clearInterval(timerRef.current);clearInterval(sumTimerRef.current);
if(recogRef.current){try{recogRef.current.abort();}catch(e){}}
if(msRef.current)msRef.current.getTracks().forEach(function(t){t.stop();});
if(acRef.current&&acRef.current.state!=="closed")acRef.current.close();
};},[]);

// Auto-scroll
ue(function(){
if(scrollRef.current)scrollRef.current.scrollTop=scrollRef.current.scrollHeight;
},[trans,interim]);

var settings=ST.gs();

function doSummarize(){
var allTrans=transRef.current;
var fromIdx=lastSumIdxRef.current;
var newLines=allTrans.slice(fromIdx);
if(newLines.length<2)return;
sSumLd(true);
var textBlock=newLines.map(function(t,i){return(fromIdx+i+1)+". "+t.text;}).join("\n");
var totalText=allTrans.map(function(t){return t.text;}).join("\n");
aiCall(
"Transkrip rapat terbaru (baris "+(fromIdx+1)+" s/d "+allTrans.length+"):\n\n"+textBlock+
"\n\nKonteks keseluruhan:\n"+totalText.substring(0,2000)+
"\n\nBuat ringkasan poin-poin penting. Tulis poin bernomor. Setiap poin singkat (1-2 kalimat). Identifikasi: keputusan, tugas/action item, topik diskusi utama.",
"Anda asisten notulen rapat profesional. Bahasa Indonesia. Ringkas terstruktur. JANGAN markdown bold/italic."
).then(function(summary){
sSumLd(false);
sSums(function(prev){return prev.concat([{
id:Date.now(),ts:Date.now(),fromLine:fromIdx+1,toLine:allTrans.length,text:summary
}]);});
lastSumIdxRef.current=allTrans.length;
});
}

function createRecognition(){
var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR)return null;
var recog=new SR();
recog.continuous=true;
recog.interimResults=true;
recog.lang=settings.lang||"id-ID";
recog.maxAlternatives=1;

recog.onresult=function(e){
if(pausedRef.current)return;
var finalText="",interimText="";
for(var i=e.resultIndex;i<e.results.length;i++){
var t=e.results[i][0].transcript;
if(e.results[i].isFinal)finalText+=t;
else interimText+=t;
}
if(finalText.trim()){
sTrans(function(prev){return prev.concat([{id:Date.now()+Math.random(),text:finalText.trim(),ts:Date.now()}]);});
sInterim("");
}else{sInterim(interimText);}
};

recog.onerror=function(e){
console.log("SR error:",e.error);
if(e.error==="not-allowed"){alert("Izin mikrofon ditolak.");stopRecording();return;}
// For other errors, let onend handle restart
};

recog.onend=function(){
// Auto-restart if still recording and not paused
if(phRef.current==="recording"&&!pausedRef.current&&!restartingRef.current){
restartingRef.current=true;
setTimeout(function(){
restartingRef.current=false;
if(phRef.current==="recording"&&!pausedRef.current&&recogRef.current){
try{recogRef.current.start();}catch(ex){
// If the old one is dead, create a new one
var newRecog=createRecognition();
if(newRecog){recogRef.current=newRecog;try{newRecog.start();}catch(ex2){}}
}
}
},300);
}
};

return recog;
}

function startRecording(){
if(!("webkitSpeechRecognition" in window)&&!("SpeechRecognition" in window)){
alert("Browser tidak mendukung Speech Recognition.\nGunakan Chrome atau Edge.");return;
}
sTrans([]);sSums([]);sEl(0);sInterim("");
lastSumIdxRef.current=0;sPaused(false);

navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}}).then(function(stream){
msRef.current=stream;
var ac=new(window.AudioContext||window.webkitAudioContext)();
acRef.current=ac;
var src=ac.createMediaStreamSource(stream);
var an=ac.createAnalyser();an.fftSize=2048;an.smoothingTimeConstant=0.8;
src.connect(an);sAnalyser(an);

var recog=createRecognition();
if(!recog){alert("SpeechRecognition tidak tersedia.");return;}
recogRef.current=recog;

try{recog.start();}catch(ex){console.log("Start error",ex);}

sPh("recording");
timerRef.current=setInterval(function(){sEl(function(e){return e+1;});},1000);

var intervalMs=(settings.interval||2)*60*1000;
sumTimerRef.current=setInterval(function(){
if(!pausedRef.current&&phRef.current==="recording")doSummarize();
},intervalMs);

}).catch(function(e){alert("Gagal akses mikrofon: "+e.message);});
}

function togglePause(){
var next=!pausedRef.current;
sPaused(next);
if(next){
try{if(recogRef.current)recogRef.current.stop();}catch(e){}
}else{
// Resume: create fresh recognition
var recog=createRecognition();
if(recog){recogRef.current=recog;try{recog.start();}catch(e){}}
}
}

function stopRecording(){
clearInterval(timerRef.current);clearInterval(sumTimerRef.current);
sPh("done");
if(recogRef.current){try{recogRef.current.abort();}catch(e){}}
recogRef.current=null;
if(msRef.current){msRef.current.getTracks().forEach(function(t){t.stop();});msRef.current=null;}
if(acRef.current&&acRef.current.state!=="closed"){acRef.current.close();}
sAnalyser(null);sInterim("");

// Final summarize if there's unsummarized content
var allT=transRef.current;
if(allT.length>lastSumIdxRef.current&&allT.length>=2){
doSummarize();
}

// Save session
var sessionTitle=title||("Rapat "+new Date().toLocaleDateString("id-ID",{day:"numeric",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"}));
ST.as({id:Date.now()+"",title:sessionTitle,ts:Date.now(),duration:el,transcript:transRef.current,summaries:sums.concat([]),lang:settings.lang});
}

function resetRec(){
sPh("idle");sTrans([]);sSums([]);sEl(0);sInterim("");sTitle("");
lastSumIdxRef.current=0;
}

function copyAll(){
var text="NOTULEN RAPAT\n"+(title||"Rapat")+"\n"+
new Date().toLocaleDateString("id-ID",{weekday:"long",day:"numeric",month:"long",year:"numeric"})+"\n"+
"Durasi: "+fmt(el)+"\n\n"+
"=== RINGKASAN ===\n\n"+
sums.map(function(s,i){return"[Bagian "+(i+1)+"]\n"+s.text;}).join("\n\n")+
"\n\n=== TRANSKRIP LENGKAP ===\n\n"+
trans.map(function(t){return"["+fmtTs(t.ts)+"] "+t.text;}).join("\n");
navigator.clipboard.writeText(text).then(function(){alert("Tersalin ke clipboard!");});
}

function renderRec(){
return h`<div>

<div style=${{maxWidth:480,margin:"0 auto",padding:"0 16px 16px"}}>

${ph==="idle"&&h`<div>

</div>

<div className="gl" style=${{padding:16,marginBottom:12}}>
