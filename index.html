/* ─── AI CALL ─── */
function aiCall(prompt,sysPrompt){
return new Promise(function(res){
var settings=ST.gs();
var key=settings.apiKey;
if(!key){res("[Atur API Key di tab Pengaturan]");return;}
var provider=settings.apiProvider||"groq";
var url,model,headers,body;
if(provider==="groq"){
url="https://api.groq.com/openai/v1/chat/completions";
model="llama-3.3-70b-versatile";
headers={"Content-Type":"application/json","Authorization":"Bearer "+key};
body=JSON.stringify({model:model,messages:[{role:"system",content:sysPrompt||"Anda adalah asisten notulen rapat. Bahasa Indonesia. Ringkas, padat, terstruktur. JANGAN gunakan markdown formatting."},{role:"user",content:prompt}],temperature:0.3,max_tokens:800});
}else{
url="https://api.anthropic.com/v1/messages";
model="claude-sonnet-4-20250514";
headers={"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"};
body=JSON.stringify({model:model,system:sysPrompt||"Anda adalah asisten notulen rapat. Bahasa Indonesia. Ringkas, padat, terstruktur. JANGAN gunakan markdown formatting.",messages:[{role:"user",content:prompt}],max_tokens:800});
}
fetch(url,{method:"POST",headers:headers,body:body}).then(function(r){return r.json();}).then(function(d){
if(provider==="groq"){
if(d.error)throw new Error(d.error.message);
res(d.choices[0].message.content);
}else{
if(d.error)throw new Error(d.error.message);
res(d.content[0].text);
}
}).catch(function(e){res("Error: "+e.message);});
});
}

x.lineWidth=6;x.strokeStyle="rgba(88,86,214,0.08)";x.beginPath();px=0;
for(var i=0;i<data.length;i++){

i===0?x.moveTo(px,y):x.lineTo(px,y);px+=sw;
}x.stroke();

draw();

},[p.active,p.analyser]);

}

/* ─── AMPLITUDE BARS ─── */
function AmpBars(p){
var cvs=ur(null),raf=ur(null);
ue(function(){
if(!p.active||!p.analyser||!cvs.current)return;
var c=cvs.current,x=c.getContext("2d");

function draw(){
raf.current=requestAnimationFrame(draw);
p.analyser.getByteFrequencyData(fData);
var dp=devicePixelRatio||1,rc=c.getBoundingClientRect();
c.width=rc.width*dp;c.height=rc.height*dp;
x.scale(dp,dp);
var W=rc.width,H=rc.height,bars=40,gap=2;
var bw=(W-(bars-1)*gap)/bars;
x.clearRect(0,0,W,H);
for(var i=0;i<bars;i++){
var idx=Math.floor(i*(fData.length/bars));
var val=fData[idx]/255;
var bh=Math.max(2,val*H*0.9);
var xx=i*(bw+gap);
var r=Math.round(88+(val*80));
var g=Math.round(86+(val*60));
var b=Math.round(214-(val*20));
x.fillStyle="rgba("+r+","+g+","+b+","+(0.3+val*0.7)+")";
x.beginPath();
x.roundRect(xx,H-bh,bw,bh,bw/2);
x.fill();
}
}
draw();
return function(){cancelAnimationFrame(raf.current);};
},[p.active,p.analyser]);
return h`<canvas ref=${cvs} style=${{width:"100%",height:p.h||50,borderRadius:12,background:"rgba(255,255,255,0.4)"}}/>`;
}

return h`<div>
${tab==="rec"&&h`<div style=${{paddingTop:0}}><${RecTab}/></div>`}
${tab==="notes"&&h`<div style=${{paddingTop:40}}><${NotesTab}/></div>`}

<div className="btab">
