<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Notulen AI — Smart Meeting Notes</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap');

:root {
–glass-bg: rgba(255,255,255,0.42);
–glass-border: rgba(255,255,255,0.55);
–glass-highlight: rgba(255,255,255,0.85);
–glass-shadow: rgba(0,0,0,0.04);
–glass-blur: 40px;
–blue: #0A84FF; –red: #FF453A; –purple: #AF52DE;
–green: #34C759; –orange: #FF9F0A; –indigo: #5856D6;
–teal: #30B0C7; –pink: #FF2D55;
–tx: #1C1C1E; –tx2: #3A3A3C; –tx3: #8E8E93; –tx4: #AEAEB2;
–radius-xl: 26px; –radius-lg: 20px; –radius-md: 14px; –radius-sm: 10px;
}

- { margin:0; padding:0; box-sizing:border-box; }

body {
font-family: ‘Plus Jakarta Sans’, -apple-system, BlinkMacSystemFont, ‘SF Pro Display’, sans-serif;
min-height: 100dvh; background: #F0EFF5; color: var(–tx);
-webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
padding-bottom: 100px; overflow-x: hidden;
}

/* ══ MESH BACKGROUND ══ */
.mesh-bg {
position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
background:
radial-gradient(ellipse 80% 60% at 10% 0%, rgba(88,86,214,0.08) 0%, transparent 50%),
radial-gradient(ellipse 60% 80% at 95% 20%, rgba(48,176,199,0.06) 0%, transparent 50%),
radial-gradient(ellipse 70% 50% at 50% 100%, rgba(175,82,222,0.06) 0%, transparent 50%),
radial-gradient(ellipse 40% 40% at 70% 60%, rgba(255,159,10,0.04) 0%, transparent 50%);
}

/* ══ LIQUID GLASS MATERIAL ══ */
.liquid-glass {
background: var(–glass-bg);
-webkit-backdrop-filter: blur(var(–glass-blur)) saturate(180%);
backdrop-filter: blur(var(–glass-blur)) saturate(180%);
border: 0.5px solid var(–glass-border);
border-radius: var(–radius-xl);
box-shadow:
0 0.5px 0 0 var(–glass-highlight) inset,
0 8px 32px var(–glass-shadow),
0 2px 8px rgba(0,0,0,0.02);
position: relative;
overflow: hidden;
}
.liquid-glass::before {
content: ‘’; position: absolute; top: 0; left: 0; right: 0; height: 50%;
background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 100%);
pointer-events: none; border-radius: var(–radius-xl) var(–radius-xl) 0 0;
}

.glass-card {
background: rgba(255,255,255,0.55);
-webkit-backdrop-filter: blur(20px) saturate(160%);
backdrop-filter: blur(20px) saturate(160%);
border: 0.5px solid rgba(255,255,255,0.6);
border-radius: var(–radius-lg);
box-shadow: 0 1px 0 0 rgba(255,255,255,0.7) inset, 0 4px 16px rgba(0,0,0,0.03);
position: relative;
}

/* ══ ANIMATIONS ══ */
@keyframes slideUp {
from { opacity:0; transform: translateY(20px) scale(0.97); }
to { opacity:1; transform: translateY(0) scale(1); }
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes breathe { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.08);opacity:0.7} }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.3} }
@keyframes ripple-ring {
0% { box-shadow: 0 0 0 0 rgba(255,69,58,0.25); }
70% { box-shadow: 0 0 0 24px rgba(255,69,58,0); }
100% { box-shadow: 0 0 0 0 rgba(255,69,58,0); }
}
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes shimmer {
0% { background-position: -200% 0; }
100% { background-position: 200% 0; }
}
@keyframes float-in {
from { opacity: 0; transform: translateY(12px) scale(0.95); }
to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ══ TYPOGRAPHY ══ */
.heading-xl { font-size: 28px; font-weight: 800; letter-spacing: -0.8px; line-height: 1.15; }
.heading-lg { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
.heading-md { font-size: 16px; font-weight: 700; letter-spacing: -0.2px; }
.label-sm { font-size: 12px; font-weight: 700; letter-spacing: 0.3px; text-transform: uppercase; }
.body { font-size: 15px; line-height: 1.55; font-weight: 500; }
.caption { font-size: 13px; color: var(–tx3); font-weight: 500; }

/* ══ PILL BADGE ══ */
.pill {
border-radius: 100px; padding: 5px 12px; display: inline-flex; align-items: center; gap: 5px;
font-size: 11px; font-weight: 700; letter-spacing: 0.2px;
}

/* ══ BUTTONS ══ */
button {
-webkit-tap-highlight-color: transparent; touch-action: manipulation;
transition: all .2s cubic-bezier(0.25, 0.46, 0.45, 0.94); font-family: inherit; cursor: pointer;
}
button:active { transform: scale(0.95); }
button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

/* ══ BOTTOM TAB BAR — iOS 26 FLOATING ══ */
.tab-bar-wrap {
position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
padding: 8px 20px calc(env(safe-area-inset-bottom, 12px) + 8px);
display: flex; justify-content: center;
}
.tab-bar {
display: flex; gap: 2px; padding: 5px;
background: rgba(255,255,255,0.65);
-webkit-backdrop-filter: blur(50px) saturate(200%);
backdrop-filter: blur(50px) saturate(200%);
border: 0.5px solid rgba(255,255,255,0.6);
border-radius: 100px;
box-shadow:
0 0.5px 0 0 rgba(255,255,255,0.8) inset,
0 8px 40px rgba(0,0,0,0.08),
0 2px 6px rgba(0,0,0,0.03);
}
.tab-bar button {
flex: 1; min-width: 88px; border: none; background: transparent;
display: flex; flex-direction: column; align-items: center; gap: 3px;
padding: 8px 18px; font-size: 10px; font-weight: 600; color: var(–tx3);
border-radius: 100px; transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
letter-spacing: 0.1px;
}
.tab-bar button.active {
background: rgba(255,255,255,0.85); color: var(–tx);
box-shadow: 0 2px 12px rgba(0,0,0,0.06), 0 0.5px 0 rgba(255,255,255,0.9) inset;
}

/* ══ INPUT FIELDS ══ */
.field {
font-family: inherit; font-size: 15px; padding: 13px 16px; border-radius: var(–radius-md);
border: 0.5px solid rgba(0,0,0,0.06); background: rgba(255,255,255,0.6);
outline: none; width: 100%; transition: 0.25s; font-weight: 500; color: var(–tx);
-webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
}
.field:focus {
border-color: rgba(88,86,214,0.35); background: rgba(255,255,255,0.85);
box-shadow: 0 0 0 4px rgba(88,86,214,0.08);
}
.field::placeholder { color: var(–tx4); }

/* ══ NOTE CARDS ══ */
.note-card {
background: rgba(255,255,255,0.7); border-radius: var(–radius-lg);
padding: 16px; margin-bottom: 10px;
animation: float-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) backwards;
border: 0.5px solid rgba(255,255,255,0.5);
box-shadow: 0 2px 12px rgba(0,0,0,0.02);
}

/* ══ SPINNER ══ */
.spinner {
border: 2.5px solid rgba(175,82,222,0.15); border-top: 2.5px solid var(–purple);
border-radius: 50%; width: 14px; height: 14px; animation: spin 0.8s linear infinite;
display: inline-block;
}

/* ══ SEGMENT CONTROL ══ */
.segment-wrap {
display: flex; gap: 3px; background: rgba(0,0,0,0.04); padding: 3px; border-radius: var(–radius-sm);
}
.segment-btn {
flex: 1; padding: 9px 0; border-radius: 8px; border: none; background: transparent;
font-size: 13px; font-weight: 700; color: var(–tx3); transition: 0.25s;
}
.segment-btn.on {
background: #FFF; color: var(–tx);
box-shadow: 0 1px 6px rgba(0,0,0,0.06), 0 0.5px 0 rgba(255,255,255,0.9) inset;
}

/* ══ EXECUTIVE CARD ══ */
.exec-card {
background: linear-gradient(135deg, rgba(175,82,222,0.06), rgba(88,86,214,0.04));
border: 0.5px solid rgba(175,82,222,0.15);
}

/* ══ SECTION HEADER ══ */
.section-header {
display: flex; align-items: center; gap: 6px; margin-bottom: 12px;
font-size: 12px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase;
}

/* ══ DIVIDER ══ */
.divider { height: 0.5px; background: rgba(0,0,0,0.06); margin: 0 -20px; }

/* ══ SCROLLBAR ══ */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 4px; }

/* ══ SAFE AREA ══ */
@supports (padding: env(safe-area-inset-bottom)) {
body { padding-bottom: calc(100px + env(safe-area-inset-bottom)); }
}
</style>

<script>
var h=htm.bind(React.createElement),us=React.useState,ur=React.useRef,ue=React.useEffect;

/* ═══ STORAGE (v9) ═══ */
var DB={
get:function(){try{return JSON.parse(localStorage.getItem(“notulen_v9”)||“null”)||this.def()}catch(e){return this.def()}},
def:function(){return{history:[],set:{lang:“id-ID”,key:””,provider:“groq”,chunk:30}}},
save:function(d){localStorage.setItem(“notulen_v9”,JSON.stringify(d))},
addHist:function(r){var d=this.get();d.history.unshift(r);if(d.history.length>50)d.history.length=50;this.save(d)},
delHist:function(id){var d=this.get();d.history=d.history.filter(function(x){return x.id!==id});this.save(d)},
getSet:function(){return this.get().set},
updSet:function(k,v){var d=this.get();d.set[k]=v;this.save(d);window.__AK=d.set.key},
migrate:function(){
try{
var old=JSON.parse(localStorage.getItem(“notulen_v8”)||“null”);
if(old && !localStorage.getItem(“notulen_v9”)){localStorage.setItem(“notulen_v9”,JSON.stringify(old))}
}catch(e){}
}
};
DB.migrate();

function cleanMD(str){if(!str)return””;return str.replace(/**/g,’’).replace(/^*/gm,’•’).replace(/ */g,’ •’)}

/* ═══ ICON ═══ */
function Ic(p){
var s=p.size||20,c=p.color||“currentColor”,paths={
mic:“M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z M19 10v2a7 7 0 0 1-14 0v-2 M12 19v4 M8 23h8”,
stop:“M6 6h12v12H6z”,play:“M5 3l14 9-14 9V3z”,check:“M20 6L9 17l-5-5”,
file:“M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z M14 2v6h6 M16 13H8 M16 17H8 M10 9H8”,
settings:“M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z”,
trash:“M3 6h18 M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2 M10 11v6 M14 11v6”,
key:“M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4”,
sparkle:“M12 2l3 6 6 3-6 3-3 6-3-6-6-3 6-3z”,

eye:“M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z M12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z”,

bot:“M12 8V4 M8 4h8 M2 14h2 M20 14h2 M15 13v2 M9 13v2 M4 8h16v12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z”,

};
return h`<svg width=${s} height=${s} viewBox="0 0 24 24" fill="none" stroke=${c} strokeWidth=${p.sw||2} strokeLinecap="round" strokeLinejoin="round"><path d=${paths[p.name]||""}/></svg>`;

/* ═══ API CALLS ═══ */
function transcribeAudio(audioBlob,lang,key){
return new Promise(function(resolve,reject){
var fd=new FormData();fd.append(“file”,audioBlob,“chunk.webm”);fd.append(“model”,“whisper-large-v3-turbo”);
fd.append(“response_format”,“json”);fd.append(“language”,lang===“id-ID”?“id”:“en”);
fetch(“https://api.groq.com/openai/v1/audio/transcriptions”,{method:“POST”,headers:{“Authorization”:“Bearer “+key},body:fd})
.then(function(r){return r.json()}).then(function(d){if(d.error)throw new Error(d.error.message);resolve(d.text)})
.catch(function(e){reject(e.message||e)});
});
}
function aiSummarizeChunk(text,lang,key){
return new Promise(function(resolve,reject){
var prompt=lang===“id-ID”?“Buat ringkasan singkat (1-3 poin) dari transkrip 30 detik ini. Jangan gunakan format markdown. Berikan poin langsung.\n\nTranskrip:\n”+text
:“Extract key bullet points from this short meeting chunk. Plain text only, NO markdown.\n\nTranscript:\n”+text;
fetch(“https://api.groq.com/openai/v1/chat/completions”,{method:“POST”,headers:{“Content-Type”:“application/json”,“Authorization”:“Bearer “+key},
body:JSON.stringify({model:“llama-3.3-70b-versatile”,messages:[{role:“system”,content:“You are a concise meeting assistant. Plain text, no markdown.”},{role:“user”,content:prompt}],temperature:0.3,max_tokens:300})
}).then(function(r){return r.json()}).then(function(d){if(d.error)throw new Error(d.error.message);resolve(d.choices[0].message.content)})
.catch(function(e){reject(e.message||e)});
});
}
function aiSummarizeOverall(text,lang,key){
return new Promise(function(resolve,reject){
var prompt=lang===“id-ID”?“Buat Ringkasan Eksekutif komprehensif. Sertakan: Topik Utama, Keputusan, Tindak Lanjut. PENTING: Jangan gunakan markdown.\n\nTranskrip:\n”+text
:“Create a comprehensive Executive Summary. Include: Main Topics, Decisions, Action Items. No markdown.\n\nTranscript:\n”+text;
fetch(“https://api.groq.com/openai/v1/chat/completions”,{method:“POST”,headers:{“Content-Type”:“application/json”,“Authorization”:“Bearer “+key},
body:JSON.stringify({model:“llama-3.3-70b-versatile”,messages:[{role:“system”,content:“Expert executive secretary. No markdown.”},{role:“user”,content:prompt}],temperature:0.4,max_tokens:1500})
}).then(function(r){return r.json()}).then(function(d){if(d.error)throw new Error(d.error.message);resolve(d.choices[0].message.content)})
.catch(function(e){reject(e.message||e)});
});
}
function fmt(s){return String(Math.floor(s/60)).padStart(2,“0”)+”:”+String(s%60).padStart(2,“0”)}

/* ═══ WAVEFORM VISUALIZER ═══ */
function WaveVis(p){
var cv=ur(null),rf=ur(null);
ue(function(){
if(!p.an||!cv.current)return;
var c=cv.current,x=c.getContext(“2d”),da=new Uint8Array(p.an.frequencyBinCount);
function draw(){
rf.current=requestAnimationFrame(draw);
p.an.getByteFrequencyData(da);
var dp=devicePixelRatio||1,rc=c.getBoundingClientRect();
c.width=rc.width*dp;c.height=rc.height*dp;x.scale(dp,dp);
var W=rc.width,H=rc.height;x.clearRect(0,0,W,H);
var sm=0;for(var i=0;i<da.length;i++)sm+=da[i];
var av=sm/da.length/255;
var bars=40,gap=3,bw=(W-(bars-1)*gap)/bars;
for(var i=0;i<bars;i++){
var dist=Math.abs(i-bars/2)/(bars/2);
var baseH=H*0.15;
var activeH=H*0.85*av*(1-dist*0.5);
var bh=Math.max(baseH,activeH);
var yy=(H-bh)/2,xx=i*(bw+gap);
var ratio=i/bars;
if(av>0.1){
var r=Math.round(88+(175-88)*ratio);
var g=Math.round(86+(82-86)*ratio);
var b=Math.round(214+(222-214)*ratio);
var alpha=0.35+av*0.65;
x.fillStyle=“rgba(”+r+”,”+g+”,”+b+”,”+alpha+”)”;
} else {
x.fillStyle=“rgba(142,142,147,0.15)”;
}
x.beginPath();x.roundRect(xx,yy,bw,bh,bw/2);x.fill();
}
}
draw();return function(){cancelAnimationFrame(rf.current)};
},[p.an]);
return h`<canvas ref=${cv} style=${{width:"100%",height:48,display:"block",borderRadius:14}}/>`;
}

/* ═══ STATUS ICON (animated mic circle) ═══ */
function StatusOrb(p){
var isRec=p.isRec;
return h`<div style=${{ display:"flex",alignItems:"center",justifyContent:"center", width:96,height:96,borderRadius:48,position:"relative", background:isRec?"rgba(255,69,58,0.08)":"rgba(88,86,214,0.06)", transition:"all 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)" }}> ${isRec && h`<div style=${{position:“absolute”,inset:0,borderRadius:48,animation:“ripple-ring 2s ease-out infinite”}}/>`} ${isRec && h`<div style=${{position:“absolute”,inset:6,borderRadius:42,border:“2px solid rgba(255,69,58,0.15)”,animation:“breathe 2s ease-in-out infinite”}}/>`}
<div style=${{
width:64,height:64,borderRadius:32,display:“flex”,alignItems:“center”,justifyContent:“center”,
background:isRec?“linear-gradient(135deg,#FF453A,#FF6961)”:“linear-gradient(135deg,#5856D6,#7B79E8)”,
boxShadow:isRec?“0 8px 28px rgba(255,69,58,0.3)”:“0 8px 28px rgba(88,86,214,0.25)”,
transition:“all 0.5s”
}}>
<${Ic} name=${isRec?“waveform”:“mic”} size=${28} color=”#FFF” sw=${2.5}/>
</div>

  </div>`;
}

/* ═══════════════════════
TAB: REKAM
═══════════════════════ */
function RecTab(p){
var set=p.set,updSet=p.updSet,onSaveComplete=p.onSaveComplete;
var _isRec=us(false),isRec=_isRec[0],setRec=_isRec[1];
var _time=us(0),time=_time[0],setTime=_time[1];
var _title=us(””),title=_title[0],setTitle=_title[1];
var _an=us(null),analyser=_an[0],setAn=_an[1];
var _fin=us([]),fin=_fin[0],setFin=_fin[1];
var _notes=us([]),notes=_notes[0],setNotes=_notes[1];
var _saving=us(false),saving=_saving[0],setSaving=_saving[1];
var _status=us(””),statusMsg=_status[0],setStatusMsg=_status[1];

var isRecRef=ur(false),isFinalizingRef=ur(false);
var timeRef=ur(0),pendingReqs=ur(0);
var streamRef=ur(null),acRef=ur(null),mrRef=ur(null);
var loopIntervalRef=ur(null),clockIntervalRef=ur(null);
var finRef=ur([]),notesRef=ur([]),titleRef=ur(””);

function addFin(data){setFin(function(p){var n=p.concat([data]);finRef.current=n;return n})}
function addNote(data){setNotes(function(p){var n=p.concat([data]);notesRef.current=n;return n})}

function autoSaveIfDone(){
if(!isRecRef.current&&pendingReqs.current===0&&!isFinalizingRef.current){
if(finRef.current.length===0){setSaving(false);return}
isFinalizingRef.current=true;setStatusMsg(“Menganalisis keseluruhan…”);
var finalRaw=finRef.current.map(function(x){return”[”+fmt(x.time)+”] “+x.text}).join(”\n\n”);
var finalSumChunk=notesRef.current.map(function(x){return”[”+fmt(x.time)+”]\n”+x.text}).join(”\n\n”);
aiSummarizeOverall(finalRaw,set.lang,window.__AK)
.then(function(overallSum){
DB.addHist({id:Date.now().toString(),date:new Date().toISOString(),duration:timeRef.current,
title:titleRef.current||(“Rapat “+new Date().toLocaleDateString(“id-ID”,{day:“numeric”,month:“short”,hour:“2-digit”,minute:“2-digit”})),
transcript:finalRaw,notes:cleanMD(finalSumChunk),overall:cleanMD(overallSum)});
setSaving(false);onSaveComplete();resetAll()})

function processChunk(blob,startTime){
pendingReqs.current++;
transcribeAudio(blob,set.lang,window.__AK)
.then(function(text){
if(!text||text.trim().length<5)return;
var ct=text.trim();addFin({time:startTime,text:ct,id:Date.now()});
pendingReqs.current++;
aiSummarizeChunk(ct,set.lang,window.__AK)
.then(function(s){addNote({time:startTime,text:cleanMD(s),id:Date.now()})})
.catch(function(){}).finally(function(){pendingReqs.current–;autoSaveIfDone()});
}).catch(function(){}).finally(function(){pendingReqs.current–;autoSaveIfDone()});
}

function startRecordingCycle(stream){
if(!isRecRef.current)return;
var mr=new MediaRecorder(stream);var lc=[];var st=timeRef.current;
mr.ondataavailable=function(e){if(e.data.size>0)lc.push(e.data)};
mr.onstop=function(){if(lc.length>0)processChunk(new Blob(lc,{type:‘audio/webm’}),st)};
mr.start();mrRef.current=mr;
}

function startRec(){
if(!window.__AK){alert(“Isi API Key Groq di Pengaturan.”);return}
if(!navigator.mediaDevices){alert(“Browser tidak mendukung mic.”);return}
resetAll();isRecRef.current=true;setRec(true);titleRef.current=title;
navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
streamRef.current=stream;
var ac=new(window.AudioContext||window.webkitAudioContext)();acRef.current=ac;
var src=ac.createMediaStreamSource(stream);var an=ac.createAnalyser();
an.fftSize=2048;an.smoothingTimeConstant=0.8;src.connect(an);setAn(an);
startRecordingCycle(stream);
clockIntervalRef.current=setInterval(function(){timeRef.current++;setTime(timeRef.current)},1000);
var cDur=(set.chunk||30)*1000;
loopIntervalRef.current=setInterval(function(){
if(isRecRef.current&&mrRef.current&&mrRef.current.state===“recording”){
mrRef.current.stop();setTimeout(function(){startRecordingCycle(streamRef.current)},50)}
},cDur);
}).catch(function(e){alert(“Gagal mic: “+e.message);resetAll()});
}

function stopRec(){
isRecRef.current=false;setRec(false);setSaving(true);setStatusMsg(“Menyatukan transkrip…”);
clearInterval(clockIntervalRef.current);clearInterval(loopIntervalRef.current);
if(mrRef.current&&mrRef.current.state===“recording”)mrRef.current.stop();
if(streamRef.current){streamRef.current.getTracks().forEach(function(t){t.stop()});streamRef.current=null}
if(acRef.current&&acRef.current.state!==“closed”)acRef.current.close();setAn(null);
setTimeout(autoSaveIfDone,500);
}

function resetAll(){
setFin([]);setNotes([]);setTime(0);setTitle(””);setSaving(false);setStatusMsg(””);
finRef.current=[];notesRef.current=[];timeRef.current=0;titleRef.current=””;
